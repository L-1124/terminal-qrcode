name: testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (ruff + pyrefly)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run Ruff Check
        run: uv run ruff check .

      - name: Run Pyrefly Check
        run: uv run pyrefly check

  test:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libturbojpeg0-dev libpng-dev libwebp-dev zlib1g-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jpeg-turbo libpng webp

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .github/scripts/vendor-windows.ps1
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          $installed = Join-Path $vcpkgRoot "installed\x64-windows-static"
          "QRT_VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CIMAGE_INCLUDE_DIRS=$installed\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CIMAGE_LIBRARY_DIRS=$installed\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run Tests
        run: uv run pytest
