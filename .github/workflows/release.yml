name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.runner }} / ${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            cibw_archs: "x86_64"
            artifact_name: "linux-x86_64"
          - runner: ubuntu-24.04-arm
            cibw_archs: "aarch64"
            artifact_name: "linux-aarch64"
          - runner: macos-15-intel
            cibw_archs: "x86_64"
            artifact_name: "macos-x86_64"
          - runner: macos-latest
            cibw_archs: "arm64"
            artifact_name: "macos-arm64"
          - runner: windows-latest
            cibw_archs: "AMD64"
            artifact_name: "windows-amd64"
    env:
      CIBW_ARCHS: ${{ matrix.cibw_archs }}
      CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0
      CIBW_BEFORE_ALL_LINUX: bash .github/scripts/vendor-linux.sh
      CIBW_BEFORE_ALL_MACOS: bash .github/scripts/vendor-macos.sh
      CIBW_BEFORE_ALL_WINDOWS: powershell -ExecutionPolicy Bypass -File .github/scripts/vendor-windows.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Cache cibuildwheel (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/cibuildwheel
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-linux.sh') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache cibuildwheel (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/cibuildwheel
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-macos.sh') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache cibuildwheel (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pypa\cibuildwheel\Cache
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-windows.ps1') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg
          key: release-vcpkg-${{ runner.os }}-${{ hashFiles('.github/scripts/vendor-windows.ps1') }}
          restore-keys: |
            release-vcpkg-${{ runner.os }}-

      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Set Windows build paths
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VCPKG_INSTALLED="$RUNNER_TEMP/vcpkg/installed/x64-windows-static"
          echo "CIMAGE_INCLUDE_DIRS=$VCPKG_INSTALLED/include" >> "$GITHUB_ENV"
          echo "CIMAGE_LIBRARY_DIRS=$VCPKG_INSTALLED/lib" >> "$GITHUB_ENV"

      - name: Build wheels with cibuildwheel
        run: uvx --from cibuildwheel==2.23.3 cibuildwheel --output-dir dist

      - name: Validate C extension in wheel
        shell: python
        run: |
          import glob
          import os
          import re
          import subprocess
          import sys
          import tempfile
          import venv
          from pathlib import Path

          runner_os = os.environ["RUNNER_OS"]
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("No wheel file found in dist/")
          interp_tag = f"cp{sys.version_info.major}{sys.version_info.minor}"
          supported = [
              wheel for wheel in wheels if re.search(rf"-{interp_tag}-{interp_tag}-", Path(wheel).name)
          ]
          if not supported:
              print(f"No wheel matching interpreter tag {interp_tag}; skip smoke validation.")
              raise SystemExit(0)
          code = "\n".join(
              [
                  "from terminal_qrcode.simple_image import SimpleImage",
                  "from terminal_qrcode import codecs",
                  "",
                  "png = SimpleImage.new('RGB', (1, 1), (1, 2, 3)).to_png_bytes()",
                  "mode, width, height, data = codecs.decode_png_with_libpng(png)",
                  "if mode != 'RGB' or width != 1 or height != 1 or len(data) != 3:",
                  "    raise SystemExit('PNG C backend smoke test failed')",
                  "",
                  "for name in ['decode_jpeg_rgb', 'decode_webp_rgba']:",
                  "    if not hasattr(codecs, name):",
                  "        raise SystemExit(f'missing API: {name}')",
                  "",
                  "print('C extension smoke test passed.')",
              ]
          )
          for wheel_path in supported:
              venv_dir = Path(tempfile.mkdtemp(prefix="tq-check-"))
              venv.create(venv_dir, with_pip=True, clear=True)

              if runner_os == "Windows":
                  py = venv_dir / "Scripts" / "python.exe"
              else:
                  py = venv_dir / "bin" / "python"

              subprocess.run([str(py), "-m", "pip", "install", "--upgrade", "pip"], check=True)
              subprocess.run([str(py), "-m", "pip", "install", wheel_path], check=True)

              subprocess.run([str(py), "-c", code], check=True)
              print(f"C extension smoke test passed for {wheel_path}")

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install build-essential
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build sdist
        run: uvx --from build python -m build --sdist --outdir dist

      - name: Check distributions
        run: uvx --from twine twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Move artifacts into dist/
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-dist/ \;
          ls -al release-dist

      - name: Verify distributions
        uses: astral-sh/setup-uv@v5

      - name: Twine check
        run: uvx --from twine twine check release-dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/
