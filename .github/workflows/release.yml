name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CIBW_ARCHS_LINUX: "x86_64 aarch64"
      CIBW_ARCHS_MACOS: "x86_64 arm64"
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_BEFORE_ALL_LINUX: bash .github/scripts/vendor-linux.sh
      CIBW_BEFORE_ALL_MACOS: bash .github/scripts/vendor-macos.sh
      CIBW_BEFORE_ALL_WINDOWS: powershell -ExecutionPolicy Bypass -File .github/scripts/vendor-windows.ps1
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build wheels with cibuildwheel
        run: uvx --from cibuildwheel==2.23.3 cibuildwheel --output-dir dist

      - name: Validate bundled vendor libraries in wheel
        shell: python
        run: |
          import glob
          import os
          import zipfile
          from pathlib import PurePosixPath

          runner_os = os.environ["RUNNER_OS"]
          platform_dir = {"Linux": "linux", "macOS": "macos", "Windows": "windows"}[runner_os]
          required = ["libpng", "libwebp"]
          if runner_os == "Windows":
              required.append("turbojpeg")
          else:
              required.extend(["libturbojpeg", "libsixel"])

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("No wheel file found in dist/")

          for wheel_path in wheels:
              with zipfile.ZipFile(wheel_path, "r") as zf:
                  names = [n for n in zf.namelist() if "/_vendor/" in f"/{n}" and not n.endswith("/")]

              for needle in required:
                  ok = any(
                      f"/_vendor/{platform_dir}/" in f"/{name}"
                      and needle in PurePosixPath(name).name.lower()
                      for name in names
                  )
                  if not ok:
                      raise SystemExit(f"Missing vendor library for '{needle}' in {wheel_path}")

              print(f"Wheel vendor validation passed for {wheel_path} on {runner_os}")

      - name: Validate runtime dynamic library loading
        shell: python
        run: |
          import glob
          import os
          import subprocess
          import tempfile
          import venv
          from pathlib import Path

          runner_os = os.environ["RUNNER_OS"]
          expect_sixel = runner_os in {"Linux", "macOS"}
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("No wheel file found in dist/")
          code = "\n".join(
              [
                  "import os",
                  "from terminal_qrcode import codecs",
                  "",
                  "checks = [",
                  "    ('turbojpeg', codecs._load_turbojpeg_cffi()),",
                  "    ('libpng', codecs._load_libpng_cffi()),",
                  "    ('libwebp', codecs._load_libwebp_cffi()),",
                  "]",
                  "for name, result in checks:",
                  "    if result is None:",
                  "        raise SystemExit(f'{name} failed to load from wheel runtime')",
                  "",
                  "libsixel_result = codecs._load_libsixel_cffi()",
                  "if os.environ.get('EXPECT_SIXEL') == '1' and libsixel_result is None:",
                  "    raise SystemExit('libsixel failed to load from wheel runtime')",
                  "if os.environ.get('EXPECT_SIXEL') != '1' and libsixel_result is None:",
                  "    print('libsixel not bundled on this platform; fallback expected.')",
                  "",
                  "print('Runtime library load checks passed.')",
              ]
          )
          for wheel_path in wheels:
              venv_dir = Path(tempfile.mkdtemp(prefix="tq-wheel-check-"))
              venv.create(venv_dir, with_pip=True, clear=True)

              if runner_os == "Windows":
                  py = venv_dir / "Scripts" / "python.exe"
              else:
                  py = venv_dir / "bin" / "python"

              subprocess.run([str(py), "-m", "pip", "install", "--upgrade", "pip"], check=True)
              subprocess.run([str(py), "-m", "pip", "install", wheel_path], check=True)

              env = os.environ.copy()
              env["EXPECT_SIXEL"] = "1" if expect_sixel else "0"
              subprocess.run([str(py), "-c", code], check=True, env=env)
              print(f"Runtime library load checks passed for {wheel_path}")

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install build-essential
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build sdist
        run: uvx --from build python -m build --sdist --outdir dist

      - name: Check distributions
        run: uvx --from twine twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Move artifacts into dist/
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-dist/ \;
          ls -al release-dist

      - name: Verify distributions
        uses: astral-sh/setup-uv@v5

      - name: Twine check
        run: uvx --from twine twine check release-dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/
