name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.runner }} / ${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            cibw_archs: "x86_64"
            artifact_name: "linux-x86_64"
          - runner: ubuntu-latest
            cibw_archs: "i686"
            artifact_name: "linux-i686"
          - runner: ubuntu-24.04-arm
            cibw_archs: "aarch64"
            artifact_name: "linux-aarch64"
          - runner: macos-15-intel
            cibw_archs: "x86_64"
            artifact_name: "macos-x86_64"
          - runner: macos-latest
            cibw_archs: "arm64"
            artifact_name: "macos-arm64"
          - runner: windows-latest
            cibw_archs: "AMD64"
            artifact_name: "windows-amd64"
          - runner: windows-latest
            cibw_archs: "x86"
            artifact_name: "windows-x86"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Cache cibuildwheel (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/cibuildwheel
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-linux.sh') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache cibuildwheel (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/cibuildwheel
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-macos.sh') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache cibuildwheel (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pypa\cibuildwheel\Cache
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-windows.ps1') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/vcpkg
          key: release-vcpkg-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('.github/scripts/vendor-windows.ps1') }}
          restore-keys: |
            release-vcpkg-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Set Windows build paths
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ "${{ matrix.cibw_archs }}" == "x86" ]; then
            VCPKG_ARCH="x86"
          else
            VCPKG_ARCH="x64"
          fi
          VCPKG_INSTALLED="$RUNNER_TEMP/vcpkg/installed/${VCPKG_ARCH}-windows-static-md"
          echo "CIMAGE_INCLUDE_DIRS=$VCPKG_INSTALLED/include" >> "$GITHUB_ENV"
          echo "CIMAGE_LIBRARY_DIRS=$VCPKG_INSTALLED/lib" >> "$GITHUB_ENV"
          echo "VCPKG_ARCH=$VCPKG_ARCH" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0
          CIBW_BEFORE_ALL_LINUX: bash .github/scripts/vendor-linux.sh
          CIBW_BEFORE_ALL_MACOS: bash .github/scripts/vendor-macos.sh
          CIBW_BEFORE_ALL_WINDOWS: powershell -ExecutionPolicy Bypass -File .github/scripts/vendor-windows.ps1
        with:
          output-dir: wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.artifact_name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install build-essential
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build sdist
        run: uvx --from build python -m build --sdist --outdir dist

      - name: Check distributions
        run: uvx --from twine twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Move artifacts into dist/
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-dist/ \;
          ls -al release-dist

      - name: Verify distributions
        uses: astral-sh/setup-uv@v7

      - name: Twine check
        run: uvx --from twine twine check release-dist/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/
