name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.runner }} / ${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            cibw_archs: "x86_64"
            artifact_name: "linux-x86_64"
          - runner: ubuntu-24.04-arm
            cibw_archs: "aarch64"
            artifact_name: "linux-aarch64"
          - runner: macos-15-intel
            cibw_archs: "x86_64"
            artifact_name: "macos-x86_64"
          - runner: macos-latest
            cibw_archs: "arm64"
            artifact_name: "macos-arm64"
          - runner: windows-latest
            cibw_archs: "AMD64"
            artifact_name: "windows-amd64"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Cache cibuildwheel (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/cibuildwheel
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-linux.sh') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache cibuildwheel (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/cibuildwheel
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-macos.sh') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache cibuildwheel (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pypa\cibuildwheel\Cache
          key: release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-${{ hashFiles('pyproject.toml', '.github/workflows/release.yml', '.github/scripts/vendor-windows.ps1') }}
          restore-keys: |
            release-cibw-${{ runner.os }}-${{ matrix.cibw_archs }}-

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/vcpkg
          key: release-vcpkg-${{ runner.os }}-${{ hashFiles('.github/scripts/vendor-windows.ps1') }}
          restore-keys: |
            release-vcpkg-${{ runner.os }}-

      - name: Install build-essential (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Set Windows build paths
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VCPKG_INSTALLED="$RUNNER_TEMP/vcpkg/installed/x64-windows-static"
          echo "CIMAGE_INCLUDE_DIRS=$VCPKG_INSTALLED/include" >> "$GITHUB_ENV"
          echo "CIMAGE_LIBRARY_DIRS=$VCPKG_INSTALLED/lib" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0
          CIBW_BEFORE_ALL_LINUX: bash .github/scripts/vendor-linux.sh
          CIBW_BEFORE_ALL_MACOS: bash .github/scripts/vendor-macos.sh
          CIBW_BEFORE_ALL_WINDOWS: powershell -ExecutionPolicy Bypass -File .github/scripts/vendor-windows.ps1
        with:
          output-dir: wheelhouse

      - name: Validate C extension in wheel
        run: uv run --no-project python .github/scripts/validate_wheel_smoke.py

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.artifact_name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install build-essential
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build sdist
        run: uvx --from build python -m build --sdist --outdir dist

      - name: Check distributions
        run: uvx --from twine twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Move artifacts into dist/
        shell: bash
        run: |
          mkdir -p release-dist
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-dist/ \;
          ls -al release-dist

      - name: Verify distributions
        uses: astral-sh/setup-uv@v7

      - name: Twine check
        run: uvx --from twine twine check release-dist/*

      - name: Build AI prompt for release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          release_date="$(date -u +%F)"
          prev_tag="$(git tag --sort=-v:refname | grep '^v' | grep -vx "${current_tag}" | head -n 1 || true)"

          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..${current_tag}"
            compare_link="https://github.com/${GITHUB_REPOSITORY}/compare/${prev_tag}...${current_tag}"
          else
            range="${current_tag}"
            compare_link="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${current_tag}"
          fi

          {
            cat .github/release-notes-prompt.md
            echo
            echo "----"
            echo "version: ${current_tag#v}"
            echo "release_date: ${release_date}"
            echo "highlights:"
            echo "- 本次版本包含以下提交摘要，请按主题归纳后输出。"
            echo "changes_raw:"
            git log --no-merges --pretty='- %s (%h)' "${range}" | head -n 200 || true
            echo "breaking_changes:"
            echo "- 未显式提供。若提交中无明确信息，请省略该章节。"
            echo "deprecations:"
            echo "- 未显式提供。"
            echo "fixes:"
            echo "- 请从提交中提取 bugfix。"
            echo "perf_notes:"
            echo "- 请从提交中提取性能相关变更；无数据不要量化。"
            echo "api_cli_changes:"
            echo "- 请关注 python API 与 python -m terminal_qrcode CLI 参数/行为变化。"
            echo "compatibility_notes:"
            echo "- 请关注 Kitty/iTerm2/WezTerm/Sixel/Halfblock、Windows/POSIX、tmux 行为。"
            echo "install_cmd: uv add terminal-qrcode"
            echo "thanks:"
            echo "- 感谢所有贡献者。"
            echo "compare_link: ${compare_link}"
          } > "${RUNNER_TEMP}/release-note.prompt.txt"

      - name: Validate GitHub MCP token
        shell: bash
        env:
          MCP_PAT: ${{ secrets.MCP_PAT }}
        run: |
          if [ -z "${MCP_PAT}" ]; then
            echo "::error::Missing secret MCP_PAT. GitHub MCP requires a Personal Access Token (PAT)."
            exit 1
          fi

      - name: Generate release notes with AI Inference
        id: ai_release_notes
        uses: actions/ai-inference@v1
        with:
          prompt-file: ${{ runner.temp }}/release-note.prompt.txt
          model: openai/gpt-4o
          max-tokens: 1800
          enable-github-mcp: true
          github-mcp-token: ${{ secrets.MCP_PAT }}

      - name: Save generated release notes
        shell: bash
        run: |
          cp "${{ steps.ai_release_notes.outputs.response-file }}" release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          body_path: release-notes.md

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/
